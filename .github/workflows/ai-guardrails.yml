name: Guardrails Check
on:
  push:
    branches: ["**"]
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: bun install --frozen-lockfile && pip install codespell
      - name: Lint (biome)
        run: bun run lint
      - name: Spell check
        run: codespell --skip="*.lock,bin/*,node_modules" .
      - name: Markdown lint
        run: bunx markdownlint-cli2 "**/*.md" "#node_modules" "#bin"
